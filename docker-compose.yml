services:
  app:
    build:
      context: .
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASS: app_password
      DB_NAME: parenting_seminar
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
    volumes:
      - ./:/var/www/html/project
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: parenting_seminar
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: app
      PMA_PASSWORD: app_password
    depends_on:
      - db

volumes:
  db_data:
