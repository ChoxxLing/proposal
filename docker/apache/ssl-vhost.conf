<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName localhost
        DocumentRoot /var/www/html/project/public

        SSLEngine on
        SSLCertificateFile /etc/apache2/runtime-ssl/local-cert.pem
        SSLCertificateKeyFile /etc/apache2/runtime-ssl/local-key.pem

        Alias /api /var/www/html/project/api

        <Directory /var/www/html/project/public>
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        <Directory /var/www/html/project/api>
            Options FollowSymLinks
            AllowOverride None
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/project_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/project_ssl_access.log combined
    </VirtualHost>
</IfModule>
